name: "Daily Mutual Fund Scraper"

on:
  schedule:
    # Run at 2 AM UTC every day
    - cron: '0 2 * * *'
  workflow_dispatch: # Manual trigger for testing

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install -r scraper_requirements.txt
          pip install playwright
          playwright install chromium --with-deps

      - name: Scrape and Process
        run: |
          python Phase1_Scraping/ingestion/scraper.py
          python Phase1_Scraping/ingestion/processor.py
        env:
          PYTHONPATH: ${{ github.workspace }}
          RAW_DATA_PATH: data/raw
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

      - name: Commit and Push Changes
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add data/raw/*.json
          git commit -m "Automated Data Refresh: $(date +'%Y-%m-%d')" || echo "No changes to commit"
          git push origin main
